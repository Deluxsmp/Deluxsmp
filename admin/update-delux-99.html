<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Admin Panel</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        textarea { width: 100%; height: 200px; background: #222; color: #0f0; border: 1px solid #444; }
        button { background: #cf2222; color: white; padding: 10px 20px; border: none; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Delux SMP - Quick Update</h2>
    <p>নিচে আপনার নতুন রুলস বা টেক্সট লিখুন:</p>
    <textarea id="contentBox" placeholder="এখানে আপনার index.html এর নতুন কোড দিন..."></textarea>
    <br>
    <button onclick="updateSite()">Update Website</button>

    <script>
        async function updateSite() {
            const newContent = document.getElementById('contentBox').value;
            if(!newContent) return alert("কিছু তো লিখুন!");
            
            alert("সরাসরি GitHub-এ গিয়ে ফাইলটি সেভ করাই সবচেয়ে নিরাপদ। নিচের বাটনে ক্লিক করলে আপনার GitHub এডিটর খুলে যাবে।");
            window.location.href = "https://github.com/Deluxsmp/Deluxsmp/edit/main/index.html";
        }
    </script>
</body>
</html>
